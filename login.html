<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPath Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#1e40af;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

.password-box{
    position:relative;
}

.password-box input{
    margin:10px 0;
}

.password-box button{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    width:auto;
    padding:5px 8px;
    background:none;
    color:#1e40af;
    border:none;
    cursor:pointer;
    font-size:13px;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#1e40af;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.login-btn:hover{
    opacity:0.9;
}

.login-btn:disabled{
    opacity:.6;
    cursor:not-allowed;
}

a{
    color:#1e40af;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

#error-message{
    color:red;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">

    <h1>🎓 EduPath</h1>
    <p>Login to your account</p>

    <form id="login-form">

        <input
            type="email"
            id="email"
            placeholder="Email"
            autocomplete="email"
            required>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="Password"
                autocomplete="current-password"
                required>

            <button type="button" id="togglePass">
                Show
            </button>

        </div>

        <button class="login-btn" type="submit" id="loginBtn">
            Login
        </button>

        <div id="error-message"></div>

    </form>

    <p style="margin-top:20px;">
        <a href="forgot-password.html">
            Forgot Password?
        </a>
    </p>

    <p>
        Don't have an account?
        <a href="register.html">
            Register
        </a>
    </p>

</div>

<script type="module">

import app from "./firebase.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth = getAuth(app);

const loginForm = document.getElementById("login-form");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const errorMessage = document.getElementById("error-message");
const togglePass = document.getElementById("togglePass");


// ถ้าล็อกอินอยู่แล้วให้เข้า Home ทันที
onAuthStateChanged(auth,(user)=>{
    if(user){
        window.location.href="home.html";
    }
});


// แสดง/ซ่อนรหัสผ่าน
togglePass.addEventListener("click",()=>{

    if(passwordInput.type==="password"){
        passwordInput.type="text";
        togglePass.textContent="Hide";
    }else{
        passwordInput.type="password";
        togglePass.textContent="Show";
    }

});


// Login
loginForm.addEventListener("submit",async(e)=>{

    e.preventDefault();

    errorMessage.textContent="";

    const email=emailInput.value.trim();

    // ไม่ trim password
    const password=passwordInput.value;

    loginBtn.disabled=true;
    loginBtn.textContent="Logging in...";

    try{

        await signInWithEmailAndPassword(auth,email,password);

        loginBtn.textContent="Success ✓";

        setTimeout(()=>{
            window.location.href="home.html";
        },500);

    }catch(error){

        switch(error.code){

            case "auth/invalid-email":
                errorMessage.textContent="อีเมลไม่ถูกต้อง";
                break;

            case "auth/user-not-found":
                errorMessage.textContent="ไม่พบบัญชีนี้";
                break;

            case "auth/wrong-password":
                errorMessage.textContent="รหัสผ่านไม่ถูกต้อง";
                break;

            case "auth/invalid-credential":
                errorMessage.textContent="อีเมลหรือรหัสผ่านไม่ถูกต้อง";
                break;

            case "auth/too-many-requests":
                errorMessage.textContent="พยายามเข้าสู่ระบบหลายครั้งเกินไป กรุณาลองใหม่ภายหลัง";
                break;

            default:
                errorMessage.textContent=error.message;

        }

        loginBtn.disabled=false;
        loginBtn.textContent="Login";

    }


});

</script>

</body>
</html>
