<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - EduPath</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 50px; 
      background: #f4f4f4;
    }
    .box { 
      max-width: 400px; 
      margin: 0 auto; 
      background: white; 
      padding: 30px; 
      border-radius: 10px; 
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input { 
      width: 100%; 
      padding: 12px; 
      margin: 10px 0; 
      border: 1px solid #ddd; 
      border-radius: 5px; 
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: #4285f4; 
      color: white; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      font-size: 16px;
    }
    button:hover { background: #3367d6; }
  </style>
</head>
<body>
  <div class="box">
    <h1>ลืมรหัสผ่าน</h1>
    <p>กรอกอีเมลเพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>

    <form id="forgot-form">
      <input type="email" id="email" placeholder="อีเมลที่ลงทะเบียน" required>
      <button type="submit">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
    </form>

    <p><a href="login.html">กลับไปหน้าล็อกอิน</a></p>
  </div>

  <script type="module">
    import app from './firebase.js';
    import { getAuth, sendPasswordResetEmail } from "firebase/auth";

    const auth = getAuth(app);
    const forgotForm = document.getElementById('forgot-form');
    const emailInput = document.getElementById('email');

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();

      try {
        await sendPasswordResetEmail(auth, email);
        alert("✅ ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว!\nกรุณาตรวจสอบกล่องจดหมาย (และ Junk/Spam)");
      } catch (error) {
        alert("เกิดข้อผิดพลาด: " + error.message);
      }
    });
  </script>
</body>
</html>
