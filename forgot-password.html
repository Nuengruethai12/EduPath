<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - EduPath</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f8ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
width:360px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.1);
text-align:center;
}

h1{
color:#1e40af;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#1e40af;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

button:hover{
opacity:.9;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

#message{
margin-top:15px;
font-size:14px;
}

.success{
color:green;
}

.error{
color:red;
}

a{
color:#1e40af;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="box">

<h1>🎓 EduPath</h1>

<p>Forgot Password</p>

<form id="reset-form">

<input
type="email"
id="email"
placeholder="Email"
required>

<button id="resetBtn">
Send Reset Link
</button>

<div id="message"></div>

</form>

<p style="margin-top:20px;">

<a href="login.html">

← Back to Login

</a>

</p>

</div>

<script type="module">

import app from "./firebase.js";

import{

getAuth,

sendPasswordResetEmail

}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth=getAuth(app);

const form=document.getElementById("reset-form");

const email=document.getElementById("email");

const resetBtn=document.getElementById("resetBtn");

const message=document.getElementById("message");
  form.addEventListener("submit", async(e)=>{

    e.preventDefault();

    message.className="";
    message.textContent="";

    const userEmail=email.value.trim();

    resetBtn.disabled=true;
    resetBtn.textContent="Sending...";

    try{

        await sendPasswordResetEmail(
            auth,
            userEmail
        );

        message.className="success";
        message.innerHTML=`
            ✅ ส่งลิงก์รีเซ็ตรหัสผ่านเรียบร้อยแล้ว<br><br>
            กรุณาตรวจสอบอีเมลของคุณ
        `;

        form.reset();

    }catch(error){

        message.className="error";

        switch(error.code){

            case "auth/user-not-found":
                message.textContent="ไม่พบบัญชีนี้";
                break;

            case "auth/invalid-email":
                message.textContent="รูปแบบอีเมลไม่ถูกต้อง";
                break;

            case "auth/too-many-requests":
                message.textContent="ส่งคำขอบ่อยเกินไป กรุณาลองใหม่ภายหลัง";
                break;

            default:
                message.textContent=error.message;

        }

    }

    resetBtn.disabled=false;
    resetBtn.textContent="Send Reset Link";

});

</script>

</body>
</html>
