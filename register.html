<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPath Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.register-box{
    background:white;
    padding:40px;
    width:360px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#1e40af;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

.password-box{
    position:relative;
}

.password-box button{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:#1e40af;
    cursor:pointer;
    font-size:13px;
}

.register-btn{
    width:100%;
    padding:12px;
    background:#1e40af;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.register-btn:hover{
    opacity:.9;
}

.register-btn:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#error-message{
    color:red;
    font-size:14px;
    margin-top:10px;
}

a{
    color:#1e40af;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="register-box">

<h1>🎓 EduPath</h1>
<p>Create your account</p>

<form id="register-form">

<input
type="email"
id="email"
placeholder="Email"
autocomplete="email"
required>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password"
autocomplete="new-password"
required>

<button type="button" id="togglePass1">
Show
</button>

</div>

<div class="password-box">

<input
type="password"
id="confirm-password"
placeholder="Confirm Password"
autocomplete="new-password"
required>

<button type="button" id="togglePass2">
Show
</button>

</div>

<button class="register-btn" id="registerBtn" type="submit">
Register
</button>

<div id="error-message"></div>

</form>

<p style="margin-top:20px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script type="module">

import app from "./firebase.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth = getAuth(app);

const form = document.getElementById("register-form");
const email = document.getElementById("email");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirm-password");

const registerBtn = document.getElementById("registerBtn");
const errorMessage = document.getElementById("error-message");

const togglePass1 = document.getElementById("togglePass1");
const togglePass2 = document.getElementById("togglePass2");

togglePass1.onclick = () => {

    if(password.type==="password"){
        password.type="text";
        togglePass1.textContent="Hide";
    }else{
        password.type="password";
        togglePass1.textContent="Show";
    }

};

togglePass2.onclick = () => {

    if(confirmPassword.type==="password"){
        confirmPassword.type="text";
        togglePass2.textContent="Hide";
    }else{
        confirmPassword.type="password";
        togglePass2.textContent="Show";
    }

};

form.addEventListener("submit", async(e)=>{

    e.preventDefault();

    errorMessage.textContent="";

    const userEmail = email.value.trim();
    const userPassword = password.value;
    const confirm = confirmPassword.value;

    if(userPassword !== confirm){
        errorMessage.textContent = "รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน";
        return;
    }

    if(userPassword.length < 6){
        errorMessage.textContent = "รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร";
        return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = "Creating account...";

    try{        await createUserWithEmailAndPassword(
            auth,
            userEmail,
            userPassword
        );

        // ออกจากระบบทันทีหลังสมัคร
        await signOut(auth);

        registerBtn.disabled = false;
        registerBtn.textContent = "Register";

        alert("สมัครสมาชิกสำเร็จ 🎉");

        window.location.href = "login.html";

    }catch(error){

        switch(error.code){

            case "auth/email-already-in-use":
                errorMessage.textContent = "อีเมลนี้ถูกใช้งานแล้ว";
                break;

            case "auth/invalid-email":
                errorMessage.textContent = "รูปแบบอีเมลไม่ถูกต้อง";
                break;

            case "auth/weak-password":
                errorMessage.textContent = "รหัสผ่านไม่ปลอดภัย";
                break;

            default:
                errorMessage.textContent = error.message;

        }

        registerBtn.disabled = false;
        registerBtn.textContent = "Register";

    }

});

</script>

</body>
</html>
